syntax = "proto3";

package tokenvalidation_v1;

option go_package = "token_validation/tokenvalidation_v1";

service TokenValidation {
  rpc ValidateToken (TokenRequest) returns (TokenResponse);
}

message TokenRequest {
  string token = 1;
}

message TokenResponse {
  string message = 1;
  User data = 2;
}

message User {
  int64 user_id = 1;
  string username = 2;
  string full_name = 3;
}

