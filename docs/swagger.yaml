basePath: /api/v1
definitions:
  errors.Code:
    enum:
    - UNKNOWN_ERROR
    - INTERNAL_SERVER_ERROR
    - BAD_REQUEST
    - UNAUTHORIZED
    - FORBIDDEN
    - NOT_FOUND
    - USER_NOT_FOUND
    - SESSION_NOT_FOUND
    - INVALID_PASSWORD
    - WALLET_NOT_FOUND
    - INVALID_STATUS_TRANSITION
    - DUPLICATE_REFERENCE
    - TRANSACTION_NOT_FOUND
    - INSUFFICIENT_BALANCE
    type: string
    x-enum-varnames:
    - ErrCodeUnknownError
    - ErrCodeInternalServerError
    - ErrCodeBadRequest
    - ErrCodeUnauthorized
    - ErrCodeForbidden
    - ErrCodeNotFound
    - ErrCodeUserNotFound
    - ErrCodeSessionNotFound
    - ErrCodeInvalidPassword
    - ErrCodeWalletNotFound
    - ErrCodeInvalidStatusTransition
    - ErrCodeDuplicateReference
    - ErrCodeTransactionNotFound
    - ErrCodeInsufficientBalance
  ewallet-transaction_internal_domain_transaction.Type:
    enum:
    - TOPUP
    - PURCHASE
    - REFUND
    type: string
    x-enum-varnames:
    - Topup
    - Purchase
    - Refund
  ewallet-transaction_internal_dto_transaction_dto.CreateTransactionRequest:
    properties:
      amount:
        example: 10000
        type: number
      description:
        example: Top up to buy internet package
        type: string
      transaction_type:
        allOf:
        - $ref: '#/definitions/ewallet-transaction_internal_domain_transaction.Type'
        enum:
        - TOPUP
        - PURCHASE
        - REFUND
        example: TOPUP
    required:
    - amount
    - description
    - transaction_type
    type: object
  ewallet-transaction_internal_dto_transaction_dto.CreateTransactionResponse:
    properties:
      reference:
        type: string
      transaction_status:
        type: string
    type: object
  response.BadRequestResponse:
    properties:
      error_code:
        $ref: '#/definitions/errors.Code'
      errors:
        items:
          $ref: '#/definitions/response.ValidationErrorField'
        type: array
      message:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error_code:
        $ref: '#/definitions/errors.Code'
      message:
        type: string
    type: object
  response.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
      meta: {}
    type: object
  response.ValidationErrorField:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
host: localhost:8082
info:
  contact: {}
  description: |-
    API Service for managing transaction.
    <br/><b>Developer:</b> Muhammad Brilian Satria Utama
    <b>Environment:</b> Development
  title: E Wallet API (Transaction Service)
  version: "0.0"
paths:
  /transaction/create:
    post:
      consumes:
      - application/json
      description: Processes a new transaction, updating the user's current balance
        and generating a transaction record.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Request Body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ewallet-transaction_internal_dto_transaction_dto.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/ewallet-transaction_internal_dto_transaction_dto.CreateTransactionResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BadRequestResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Transaction
      tags:
      - Transaction
swagger: "2.0"
